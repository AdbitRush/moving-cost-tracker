name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node (optional, only if you need to build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # If you have any build step for the frontend, add it here.
      # For plain static files you can skip the build step.

      - name: Deploy static site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: moving_cost_tracker/frontend
          # Force clean the gh-pages branch before deploying
          force_orphan: true

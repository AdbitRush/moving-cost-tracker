<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מעקב הוצאות מעבר דירה</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="topbar">
  <span class="topbar-title">
    🏠 מעקב הוצאות מעבר דירה
    <span class="badge">בטא</span>
  </span>
  <div class="topbar-actions">
    <button class="btn btn-outline btn-sm" id="exportCsvBtn">⬇ ייצוא CSV</button>
  </div>
</div>

<div class="main">

  <!-- KPI cards -->
  <div class="kpi-row">
    <div class="kpi-card kpi-card-total">
      <div class="kpi-icon">📦</div>
      <div class="kpi-label">סה״כ פריטים</div>
      <div class="kpi-value" id="kpiTotal">0</div>
    </div>
    <div class="kpi-card kpi-card-paid">
      <div class="kpi-icon">✅</div>
      <div class="kpi-label">שולם</div>
      <div class="kpi-value" id="kpiPaid">₪0</div>
    </div>
    <div class="kpi-card kpi-card-pending">
      <div class="kpi-icon">⏳</div>
      <div class="kpi-label">ממתין לתשלום</div>
      <div class="kpi-value" id="kpiPending">₪0</div>
    </div>
    <div class="kpi-card kpi-card-remain">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label">יתרת תקציב</div>
      <div class="kpi-value" id="kpiRemaining">₪0</div>
    </div>
  </div>

  <!-- Budget -->
  <div class="budget-card">
    <div class="budget-header">
      <h2>📊 תקציב וסיכום</h2>
      <div class="budget-input-row">
        <input type="number" id="budgetInput" placeholder="0" min="0" />
        <button class="btn btn-primary btn-sm" id="saveBudget">שמור תקציב</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-meta">
      <span id="progressSpent">₪0 הוצא</span>
      <span>מתוך <span id="progressBudgetVal">₪0</span></span>
    </div>
  </div>

  <!-- Categories -->
  <div class="panel" id="catPanel">
    <div class="panel-header" onclick="togglePanel('catPanel')">
      <h2>🏷 קטגוריות</h2>
      <span class="panel-toggle-icon">▾</span>
    </div>
    <div class="panel-body">
      <div class="cat-chips" id="catChips"></div>
      <hr class="divider" />
      <div class="cat-add-row">
        <input type="text" id="newCatName" placeholder="שם קטגוריה חדשה..." />
        <button class="btn btn-primary" id="addCategory">+ הוסף קטגוריה</button>
      </div>
    </div>
  </div>

  <!-- Items -->
  <div class="panel" id="itemsPanel">
    <div class="panel-header" onclick="togglePanel('itemsPanel')">
      <h2>📋 פריטים ועלויות</h2>
      <span class="panel-toggle-icon">▾</span>
    </div>
    <div class="panel-body">
      <div class="items-toolbar">
        <button class="filter-btn active" onclick="setFilter(this,'all')">הכל</button>
        <button class="filter-btn" onclick="setFilter(this,'pending')">⏳ ממתין</button>
        <button class="filter-btn" onclick="setFilter(this,'paid')">✅ שולם</button>
        <button class="filter-btn" onclick="setFilter(this,'cancelled')">❌ בוטל</button>
        <span class="spacer"></span>
        <input class="search-input" type="text" id="searchInput" placeholder="🔍 חיפוש..." oninput="renderItemsTable()" />
      </div>

      <div class="items-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:36px"></th>
              <th>פריט</th>
              <th>מחיר (₪)</th>
              <th>קטגוריה</th>
              <th>סטטוס</th>
              <th style="width:40px">⋯</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="itemsTbody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none">
          <div class="icon">📦</div>
          <p>אין פריטים. הוסף פריט חדש למטה.</p>
        </div>
      </div>

      <div class="divider"></div>
      <div class="add-section-label">הוסף פריט חדש</div>
      <div class="add-item-form">
        <div class="field-group" style="flex:2">
          <label>שם הפריט</label>
          <input type="text" id="newItemName" placeholder="לדוגמה: מובילים" />
        </div>
        <div class="field-group">
          <label>מחיר (₪)</label>
          <input type="number" id="newItemPrice" placeholder="0" min="0" />
        </div>
        <div class="field-group">
          <label>קטגוריה</label>
          <select id="newItemCategory"></select>
        </div>
        <div class="field-group" id="newPhoneGroup" style="display:none">
          <label>טלפון ספק</label>
          <input type="tel" id="newItemPhone" placeholder="050-..." />
        </div>
        <div class="field-group" style="align-self:end">
          <button class="btn btn-ghost btn-sm" id="togglePhoneBtn" onclick="togglePhoneField()" style="margin-bottom:6px">+ טלפון</button>
          <button class="btn btn-primary" id="addItem">+ הוסף</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="toast-container"></div>
<script src="script.js"></script>
</body>
</html>
